services:
  teleop:
    build:
      context: .
      dockerfile: Dockerfile.humble
    image: ros2-humble:foxglove
    container_name: humble
    network_mode: host
    stdin_open: true
    tty: true
    env_file:
      - ../common.env
    environment:
      - DISPLAY=${DISPLAY:-host.docker.internal:0}
      - QT_X11_NO_MITSHM=1
